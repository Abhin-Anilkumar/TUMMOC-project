# ============================================
# Craftista CI/CD Pipeline - GitHub Actions
# Target: GCP VMs with Load Balancer + Nginx
# ============================================

name: Craftista CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: read
  id-token: write          # Required for Workload Identity Federation

env:
  GCP_REGION: asia-south1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev
  REPOSITORY: craftista
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}

jobs:
  # ─────────────────────────────────────────
  # Stage 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Frontend (ESLint)
        run: |
          cd app/frontend
          npm install
          npx eslint app.js routes/ --no-eslintrc --rule '{"no-unused-vars": "warn", "no-undef": "error"}' || true

      - name: Lint Catalogue (flake8)
        run: |
          pip install flake8
          cd app/catalogue
          flake8 app.py --max-line-length=120 --ignore=E501,W503 || true

      - name: Lint Recommendation (go vet)
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - run: |
          cd app/recommendation
          go vet ./...

  # ─────────────────────────────────────────
  # Stage 2: Test
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Test Frontend
        run: |
          cd app/frontend
          npm install
          npm test || echo "Tests completed with warnings"

      - name: Test Catalogue
        run: |
          pip install -r app/catalogue/requirements.txt
          pip install pytest
          cd app/catalogue
          pytest || echo "No tests found - skipping"

  # ─────────────────────────────────────────
  # Stage 3: Build Docker Images
  # ─────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        run: |
          cd app/frontend
          docker build -t craftista-frontend:${{ github.sha }} .

      - name: Build Catalogue Image
        run: |
          cd app/catalogue
          docker build -t craftista-catalogue:${{ github.sha }} .

      - name: Build Voting Image
        run: |
          cd app/voting
          docker build -t craftista-voting:${{ github.sha }} .

      - name: Build Recommendation Image
        run: |
          cd app/recommendation
          docker build -t craftista-recommendation:${{ github.sha }} .

      - name: Build Nginx Image
        run: |
          cd nginx
          docker build -t craftista-nginx:${{ github.sha }} .

  # ─────────────────────────────────────────
  # Stage 4: Push to Google Artifact Registry
  # ─────────────────────────────────────────
  push:
    name: Push Images to GAR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and Push All Images
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}"
          TAG="${{ github.sha }}"

          # Frontend
          cd app/frontend
          docker build -t ${REGISTRY}/frontend:${TAG} -t ${REGISTRY}/frontend:latest .
          docker push ${REGISTRY}/frontend:${TAG}
          docker push ${REGISTRY}/frontend:latest
          cd ../..

          # Catalogue
          cd app/catalogue
          docker build -t ${REGISTRY}/catalogue:${TAG} -t ${REGISTRY}/catalogue:latest .
          docker push ${REGISTRY}/catalogue:${TAG}
          docker push ${REGISTRY}/catalogue:latest
          cd ../..

          # Voting
          cd app/voting
          docker build -t ${REGISTRY}/voting:${TAG} -t ${REGISTRY}/voting:latest .
          docker push ${REGISTRY}/voting:${TAG}
          docker push ${REGISTRY}/voting:latest
          cd ../..

          # Recommendation
          cd app/recommendation
          docker build -t ${REGISTRY}/recommendation:${TAG} -t ${REGISTRY}/recommendation:latest .
          docker push ${REGISTRY}/recommendation:${TAG}
          docker push ${REGISTRY}/recommendation:latest
          cd ../..

          # Nginx
          cd nginx
          docker build -t ${REGISTRY}/nginx:${TAG} -t ${REGISTRY}/nginx:latest .
          docker push ${REGISTRY}/nginx:${TAG}
          docker push ${REGISTRY}/nginx:latest

  # ─────────────────────────────────────────
  # Stage 5: Deploy to GCP VMs (via IAP tunnel)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GCP VMs
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create production docker-compose on VM
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}"

          # Generate docker-compose.prod.yml with Artifact Registry images
          cat > /tmp/docker-compose.prod.yml <<'COMPOSE_EOF'
          services:
            nginx:
              image: REGISTRY_PLACEHOLDER/nginx:latest
              container_name: craftista-nginx
              ports:
                - "80:80"
              depends_on:
                - frontend
                - catalogue
              networks:
                - craftista-net
              restart: unless-stopped

            frontend:
              image: REGISTRY_PLACEHOLDER/frontend:latest
              container_name: craftista-frontend
              environment:
                - NODE_ENV=production
                - PORT=3000
              expose:
                - "3000"
              networks:
                - craftista-net
              restart: unless-stopped

            catalogue:
              image: REGISTRY_PLACEHOLDER/catalogue:latest
              container_name: craftista-catalogue
              environment:
                - FLASK_ENV=production
              expose:
                - "5000"
              networks:
                - craftista-net
              restart: unless-stopped

            voting:
              image: REGISTRY_PLACEHOLDER/voting:latest
              container_name: craftista-voting
              expose:
                - "8080"
              networks:
                - craftista-net
              restart: unless-stopped

            recommendation:
              image: REGISTRY_PLACEHOLDER/recommendation:latest
              container_name: craftista-recommendation
              expose:
                - "8080"
              networks:
                - craftista-net
              restart: unless-stopped

          networks:
            craftista-net:
              driver: bridge
              name: craftista-network
          COMPOSE_EOF

          # Replace placeholder with actual registry URL
          sed -i "s|REGISTRY_PLACEHOLDER|${REGISTRY}|g" /tmp/docker-compose.prod.yml

      - name: Deploy to VM via IAP tunnel
        run: |
          REGISTRY="${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}"

          # Copy docker-compose.prod.yml to VM's /tmp directory first to avoid permission issues
          gcloud compute scp /tmp/docker-compose.prod.yml craftista-vm-1:/tmp/docker-compose.prod.yml \
            --zone=asia-south1-a \
            --project=${{ env.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet

          # SSH via IAP and deploy
          gcloud compute ssh craftista-vm-1 \
            --zone=asia-south1-a \
            --project=${{ env.GCP_PROJECT_ID }} \
            --tunnel-through-iap \
            --quiet \
            --command="
              # Move compose file to final destination
              sudo mv /tmp/docker-compose.prod.yml /opt/craftista/docker-compose.yml

              # Configure Docker for Artifact Registry
              sudo gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

              # Pull latest images
              cd /opt/craftista
              sudo docker compose pull

              # Deploy (rolling restart)
              sudo docker compose up -d --remove-orphans

              # Verify
              sudo docker compose ps
            "

      - name: Verify Deployment via Load Balancer
        run: |
          echo "Waiting for services to start..."
          sleep 45
          # Health check via load balancer static IP
          LB_IP=$(gcloud compute addresses describe craftista-global-ip \
            --global \
            --format='get(address)' \
            --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null || echo "LB_IP_NOT_FOUND")
          echo "Load Balancer IP: ${LB_IP}"
          if [ "${LB_IP}" != "LB_IP_NOT_FOUND" ]; then
            curl -sf --retry 3 --retry-delay 10 http://${LB_IP}/health || echo "Health check pending - LB may need a few minutes to become healthy"
          fi

