apiVersion: 1

providers:
  - name: 'Craftista Dashboards'
    orgId: 1
    folder: 'Craftista'
    folderUid: 'craftista'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
