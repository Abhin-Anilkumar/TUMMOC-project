# ============================================
# Prometheus Configuration
# Scrape targets for Craftista microservices
# ============================================

global:
  scrape_interval: 15s          # Default scrape interval
  evaluation_interval: 15s      # Rule evaluation interval
  scrape_timeout: 10s           # Scrape timeout

# ─────────────────────────────────────────
# Alerting (Optional - configure Alertmanager)
# ─────────────────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# ─────────────────────────────────────────
# Scrape Configurations
# ─────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ──────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # ── Node Exporter (Host Metrics) ────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: 'node-exporter'

  # ── Nginx (Stub Status) ────────────────
  - job_name: 'nginx'
    metrics_path: /nginx_status
    static_configs:
      - targets: ['craftista-nginx:80']
        labels:
          service: 'nginx'
          app: 'craftista'

  # ── Frontend Service ────────────────────
  - job_name: 'frontend'
    metrics_path: /
    scheme: http
    static_configs:
      - targets: ['craftista-frontend:3000']
        labels:
          service: 'frontend'
          app: 'craftista'
          language: 'nodejs'

  # ── Catalogue Service ──────────────────
  - job_name: 'catalogue'
    metrics_path: /
    scheme: http
    static_configs:
      - targets: ['craftista-catalogue:5000']
        labels:
          service: 'catalogue'
          app: 'craftista'
          language: 'python'

  # ── Voting Service ─────────────────────
  - job_name: 'voting'
    metrics_path: /
    scheme: http
    static_configs:
      - targets: ['craftista-voting:8080']
        labels:
          service: 'voting'
          app: 'craftista'
          language: 'java'

  # ── Recommendation Service ─────────────
  - job_name: 'recommendation'
    metrics_path: /
    scheme: http
    static_configs:
      - targets: ['craftista-recommendation:8080']
        labels:
          service: 'recommendation'
          app: 'craftista'
          language: 'go'
